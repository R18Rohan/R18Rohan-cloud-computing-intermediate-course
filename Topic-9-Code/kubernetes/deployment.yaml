apiVersion: apps/v1
kind: Deployment
metadata:
  name: orion-lms-deployment
  labels:
    app: orion-lms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orion-lms
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
      labels:
        app: orion-lms
    spec:
      containers:
      - name: orion-app
        image: orion-lms-app:latest
        ports:
        - containerPort: 9090
